name: Deploy VitePress site to Pages

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v2
        with:
          version: 8

      - run: pnpm install

      - run: pnpm docs:build

      - uses: actions/upload-pages-artifact@v2
        with:
          path: docs/.vitepress/dist

      - uses: actions/deploy-pages@v2